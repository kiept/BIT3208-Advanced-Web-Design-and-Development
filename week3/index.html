    <h1>Week 3 Exercises</h1>

    <section>
      <h2>Login Form (JS validation)</h2>
      <form id="loginForm" action="php/process.php" method="post">
        <label>Username<br><input name="username" id="username" required></label>
        <label>Email<br><input name="email" id="email" type="email" required></label>
        <label>Password<br><input name="password" id="password" type="password" required></label>
        <div id="pw-strength" class="muted">Password strength: <span id="strength">-</span></div>
        <button type="submit">Login</button>
      </form>
    </section>

    <section>
      <h2>Live Text Preview</h2>
      <label>Type text:<br><input id="live-input" placeholder="Type here..."></label>
      <div class="preview" id="live-preview">Live preview will appear here</div>

      </ul>
    </section>
